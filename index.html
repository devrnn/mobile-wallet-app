<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nova Core</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0c0c0e; color: #ffffff; display: flex; height: 100vh; width: 100vw; overflow: hidden; position: relative; }
        
        /* Splash Screen */
        #welcomeScreen { position: fixed; inset: 0; background: #0c0c0e; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.8s ease; }
        .welcome-text { font-size: 24px; font-weight: 700; opacity: 0; animation: fadeIn 1s forwards; }
        .sub-text { font-size: 11px; color: #44444a; margin-top: 8px; font-family: monospace; letter-spacing: 1px; }
        .loading-bar { width: 150px; height: 2px; background: #333; margin-top: 20px; overflow: hidden; }
        .loading-fill { height: 100%; background: #25a3e0; width: 0%; animation: load 2s forwards; }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes load { to { width: 100%; } }

        /* Dashboard */
        .sidebar { width: 240px; background-color: #111112; border-right: 1px solid rgba(255, 255, 255, 0.03); padding: 32px 20px; display: flex; flex-direction: column; justify-content: space-between; flex-shrink: 0; }
        @media (max-width: 768px) { .sidebar { display: none; } }
        .sidebar-group { margin-bottom: 32px; }
        .sidebar-label { font-size: 10px; text-transform: uppercase; font-weight: 700; color: #44444a; letter-spacing: 0.5px; padding-left: 12px; margin-bottom: 12px; }
        .sidebar-item { display: flex; align-items: center; gap: 12px; color: #71717a; text-decoration: none; font-size: 14px; font-weight: 500; padding: 12px; border-radius: 8px; margin-bottom: 4px; transition: all 0.15s ease; }
        .sidebar-item i { width: 16px; height: 16px; }
        .sidebar-item:hover { color: #ffffff; }
        .sidebar-item.active { background-color: #1c1c1e; color: #ffffff; }
        
        .main-dashboard { flex: 1; height: 100%; overflow-y: auto; background-color: #0c0c0e; position: relative; }
        .scroll-content { padding: calc(40px + max(10px, env(safe-area-inset-top))) 24px 40px 24px; min-height: 100%; transition: opacity 1s ease; position: relative; z-index: 2; background-color: #0c0c0e; opacity: 0; }
        .welcome-back { font-size: 14px; color: #71717a; margin-bottom: 8px; font-weight: 500; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .dashboard-title { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
        
        /* ... existing styles remain the same ... */
        .balance-card { background: linear-gradient(135deg, #25a3e0 0%, #3b52d9 45%, #9d3bf7 100%); border-radius: 20px; padding: 24px; min-height: 220px; box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2); }
        .balance-title-row { color: rgba(255, 255, 255, 0.75); font-size: 13px; font-weight: 500; }
        .wallet-selector { background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.1); color: #ffffff; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; }
        .main-balance { font-size: 38px; font-weight: 700; margin: 12px 0; color: #ffffff; }
        .currency-label { font-size: 11px; color: rgba(255, 255, 255, 0.6); margin-left: 4px; }
    </style>
</head>
<body>
    <div id="welcomeScreen">
        <div class="welcome-text">Welcome Eisa</div>
        <div class="sub-text">nova.core/wallet</div>
        <div class="loading-bar"><div class="loading-fill"></div></div>
    </div>

    <nav class="sidebar">
        <div class="sidebar-group">
            <div class="sidebar-label">Wallet</div>
            <a href="#" class="sidebar-item active"><i data-lucide="wallet"></i><span>Overview</span></a>
        </div>
    </nav>

    <main class="main-dashboard" id="dashboardContainer">
        <div class="scroll-content" id="scrollContent">
            <div class="welcome-back">Welcome back, Eisa.</div>
            <div class="dashboard-header"><h1 class="dashboard-title">Nova Core</h1></div>
            <div class="balance-card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div class="balance-title-row">Total Balance</div>
                    <select class="wallet-selector" id="walletSelector">
                        <option value="CAD">CAD Wallet</option>
                        <option value="USD">USD Wallet</option>
                    </select>
                </div>
                <div class="main-balance" id="totalBalance">$1,000.00<span class="currency-label">CAD</span></div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        // Splash logic
        setTimeout(() => {
            const screen = document.getElementById('welcomeScreen');
            screen.style.opacity = '0';
            setTimeout(() => {
                screen.style.display = 'none';
                document.getElementById('scrollContent').style.opacity = '1';
            }, 800);
        }, 2500);

        // ... existing wallet math logic here ...
    </script>
</body>
</html>

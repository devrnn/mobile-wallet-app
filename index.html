<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nova Core</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #0c0c0e; color: #ffffff; height: 100vh; overflow: hidden; }
        
        #welcomeScreen { position: fixed; inset: 0; background: #0c0c0e; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.8s ease; }
        .welcome-text { font-size: 24px; font-weight: 700; opacity: 0; animation: fadeIn 1s forwards; }
        .sub-text { font-size: 12px; color: #44444a; margin-top: 8px; font-family: monospace; }
        .loading-bar { width: 150px; height: 2px; background: #333; margin-top: 20px; overflow: hidden; }
        .loading-fill { height: 100%; background: #25a3e0; width: 0%; animation: load 2s forwards; }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes load { to { width: 100%; } }

        #appContent { opacity: 0; transition: opacity 1s ease; padding: 40px; }
    </style>
</head>
<body>

    <div id="welcomeScreen">
        <div class="welcome-text">Welcome Eisa</div>
        <div class="sub-text">nova.core/wallet</div>
        <div class="loading-bar"><div class="loading-fill"></div></div>
    </div>

    <div id="appContent">
        <h1 class="dashboard-title">Nova Core</h1>
        <p style="color: #71717a; margin-top: 10px;">Your secure digital wallet.</p>
    </div>

    <script>
        setTimeout(() => {
            const welcome = document.getElementById('welcomeScreen');
            const content = document.getElementById('appContent');
            welcome.style.opacity = '0';
            setTimeout(() => {
                welcome.style.display = 'none';
                content.style.opacity = '1';
            }, 800);
        }, 2500);
    </script>
</body>
</html>
